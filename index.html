<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="mino.trade - 개인 프로젝트 포털 및 대시보드. 나만의 도구들을 한눈에 편리하게 관리하세요.">
  <title>mino.trade | Personal Workspace Portal</title>
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/desktop.css">
</head>
<body>

  <!-- Background neon ambient spheres -->
  <div class="ambient-glow glow-1"></div>
  <div class="ambient-glow glow-2"></div>

  <!-- Desktop Hub Layout -->
  <div class="dashboard-wrapper">
    
    <!-- Sidebar Navigation -->
    <aside class="sidebar glass-panel">
      <div class="sidebar-brand">
        <span class="brand-text">MINO<span class="brand-dot">.</span>TRADE</span>
      </div>
      
      <nav class="sidebar-nav">
        <button class="nav-item active" data-category="all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
          전체 보기
        </button>
        <button class="nav-item" data-category="finance">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
          금융 및 핫딜
        </button>
        <button class="nav-item" data-category="education">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"></path></svg>
          교육 및 키즈
        </button>
        <button class="nav-item" data-category="home" id="nav-home-category">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
          스마트 홈 <span class="nav-lock-indicator">🔒</span>
        </button>
      </nav>

      <!-- Sidebar Footer (Quick Memo Pad) -->
      <div class="sidebar-footer">
        <div class="memo-widget">
          <div class="memo-header">
            <span>Quick Memo</span>
            <span class="memo-save-indicator" id="memo-saved">Saved</span>
          </div>
          <textarea id="quick-memo-pad" placeholder="오늘의 할 일이나 간단한 링크를 메모해 두세요..."></textarea>
        </div>
      </div>
    </aside>

    <!-- Main Workspace Content -->
    <main class="main-content">
      
      <!-- Top Hub Bar -->
      <header class="top-bar">
        <!-- Date & Time Widget -->
        <div class="time-widget glass-panel">
          <div class="time-main" id="clock-display">00:00:00</div>
          <div class="date-sub" id="date-display">2026년 5월 24일 일요일</div>
        </div>

        <!-- Custom Weather Widget -->
        <div class="weather-widget glass-panel">
          <div class="weather-icon">
            <svg class="weather-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          </div>
          <div class="weather-info">
            <div class="weather-temp">24.5°C</div>
            <div class="weather-desc">서울, 맑음</div>
          </div>
        </div>

        <!-- Security Status Controller -->
        <div class="security-control glass-panel" id="vault-trigger-btn">
          <div class="lock-indicator" id="lock-badge-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-svg"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          </div>
          <div class="security-meta">
            <span class="security-status-title">Vault Security</span>
            <span class="security-status-value locked" id="vault-status-label">보안 잠금 상태</span>
          </div>
        </div>
      </header>

      <!-- Projects Grid Section -->
      <section class="workspace-section">
        <div class="section-header">
          <h1 class="section-title" id="current-category-title">모든 프로젝트</h1>
          <p class="section-subtitle">민호님이 제작하고 운영 중인 서비스 모음입니다.</p>
        </div>

        <!-- Dynamic Projects Grid -->
        <div class="projects-grid" id="desktop-grid">
          <!-- Dynamic cards injected via JavaScript for advanced DOM protection -->
        </div>
      </section>

    </main>

  </div>

  <!-- PIN Vault Frosted Overlay -->
  <div class="vault-overlay" id="pin-vault-overlay">
    <div class="vault-container glass-panel">
      <div class="vault-logo">
        <svg viewBox="0 0 24 24" id="vault-lock-svg"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
      </div>
      <h2 class="vault-title">보안 인증 금고</h2>
      <p class="vault-subtitle">개인 스마트홈 및 가족 서비스 접근을 위한 PIN 번호(4자리)를 입력하세요.</p>
      
      <!-- Dots Indicator -->
      <div class="pin-dots">
        <div class="pin-dot"></div>
        <div class="pin-dot"></div>
        <div class="pin-dot"></div>
        <div class="pin-dot"></div>
      </div>

      <!-- Keypad -->
      <div class="pin-keypad">
        <button class="keypad-btn" data-val="1">1</button>
        <button class="keypad-btn" data-val="2">2</button>
        <button class="keypad-btn" data-val="3">3</button>
        <button class="keypad-btn" data-val="4">4</button>
        <button class="keypad-btn" data-val="5">5</button>
        <button class="keypad-btn" data-val="6">6</button>
        <button class="keypad-btn" data-val="7">7</button>
        <button class="keypad-btn" data-val="8">8</button>
        <button class="keypad-btn" data-val="9">9</button>
        <button class="keypad-btn action" id="keypad-clear">Clear</button>
        <button class="keypad-btn" data-val="0">0</button>
        <button class="keypad-btn action" id="keypad-delete">Del</button>
      </div>

      <button class="glass-btn" id="vault-close-btn" style="width: 100%; justify-content: center; margin-top: 1rem;">
        취소 및 닫기
      </button>
    </div>
  </div>

  <!-- Sub-link Selector Modal -->
  <div class="vault-overlay" id="sublink-modal">
    <div class="vault-container glass-panel" style="max-width: 450px;">
      <h2 class="vault-title" id="sublink-modal-title">이동 경로 선택</h2>
      <p class="vault-subtitle" id="sublink-modal-subtitle">접속할 채널 또는 대시보드를 선택해 주세요.</p>
      
      <div class="sublinks-list" id="sublinks-container" style="display:flex; flex-direction:column; gap:1rem; margin:1.5rem 0;">
        <!-- Injected dynamically via JS -->
      </div>
      
      <button class="glass-btn" id="sublink-close-btn" style="width: 100%; justify-content: center;">
        닫기
      </button>
    </div>
  </div>

  <!-- Shared Javascript dependencies -->
  <script src="js/shared.js"></script>
  <script src="js/desktop.js"></script>
</body>
</html>
